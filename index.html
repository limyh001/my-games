<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>н•ҷкөҗ нғҲм¶ң! (м—…к·ёл Ҳмқҙл“ң)</title>
<style>
html, body { margin:0; padding:0; overflow:hidden; background:#111; }
canvas { display:block; }
#ui { position:absolute; top:10px; left:10px; color:#fff; font-size:18px; }
#over { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); display:none; color:#fff; text-align:center; }
button { padding:10px 20px; font-size:16px; }
</style>
</head>
<body>
<div id="ui">м җмҲҳ: 0 | вқӨпёҸ 3</div>
<div id="over">
<h1>кІҢмһ„ мҳӨлІ„</h1>
<p id="final"></p>
<button onclick="init()">лӢӨмӢң мӢңмһ‘</button>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');
const over = document.getElementById('over');

let w,h,player,obs,items,score,lives,active;

function resize(){ w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; }

function init(){
 resize();
 player={x:w/2,y:h-100,r:20,tx:w/2,shield:0};
 obs=[]; items=[];
 score=0; lives=3; active=true;
 over.style.display='none';
 loop();
}

window.addEventListener('mousemove',e=>player.tx=e.clientX);

function spawnObstacle(){
 obs.push({x:Math.random()*w,y:-20,s:4+Math.random()*3});
}

function spawnItem(){
 const types=['вқӨпёҸ','вҡЎ','рҹӣЎпёҸ'];
 items.push({x:Math.random()*w,y:-20,type:types[Math.floor(Math.random()*types.length)],s:3});
}

function loop(){
 if(!active) return;
 ctx.clearRect(0,0,w,h);

 // н•ҷкөҗ л°°кІҪ к·ёлҰ¬кё°
 // н•ҳлҠҳ
 ctx.fillStyle = '#87CEEB';
 ctx.fillRect(0,0,w,h);

 // н•ҷкөҗ кұҙл¬ј
 ctx.fillStyle = '#ddd';
 ctx.fillRect(w*0.2,h*0.2,w*0.6,h*0.3);

 // м°Ҫл¬ё
 ctx.fillStyle = '#aaddff';
 for(let i=0;i<5;i++){
   for(let j=0;j<2;j++){
     ctx.fillRect(w*0.25 + i*(w*0.1), h*0.25 + j*(h*0.1), 40, 40);
   }
 }

 // мҡҙлҸҷмһҘ
 ctx.fillStyle = '#4caf50';
 ctx.fillRect(0,h*0.5,w,h*0.5);

 // нҠёлһҷ лқјмқё
 ctx.strokeStyle = '#ffffff';
 ctx.beginPath();
 ctx.arc(w/2,h*0.75,200,0,Math.PI*2);
 ctx.stroke();
 
 // мқҙлҸҷ
 player.x += (player.tx-player.x)*0.1;
 
 // н”Ңл Ҳмқҙм–ҙ
 ctx.font='30px Arial';
 ctx.fillText('рҹҸғ',player.x,player.y);
 
 // мһҘм• л¬ј
 if(Math.random()<0.03) spawnObstacle();
 obs.forEach((o,i)=>{
   o.y+=o.s;
   ctx.fillText('рҹ‘ЁвҖҚрҹҸ«',o.x,o.y);
   if(Math.hypot(player.x-o.x,player.y-o.y)<30){
     if(player.shield>0){ player.shield=0; }
     else{
       lives--;
       obs.splice(i,1);
       if(lives<=0) gameOver();
     }
   }
   if(o.y>h) { obs.splice(i,1); score++; }
 });
 
 // м•„мқҙн…ң
 if(Math.random()<0.01) spawnItem();
 items.forEach((it,i)=>{
   it.y+=it.s;
   ctx.fillText(it.type,it.x,it.y);
   if(Math.hypot(player.x-it.x,player.y-it.y)<30){
     if(it.type==='вқӨпёҸ') lives++;
     if(it.type==='вҡЎ') score+=5;
     if(it.type==='рҹӣЎпёҸ') player.shield=200;
     items.splice(i,1);
   }
 });
 
 // ліҙнҳёл§ү н‘ңмӢң
 if(player.shield>0){
   ctx.beginPath();
   ctx.arc(player.x,player.y-10,25,0,Math.PI*2);
   ctx.strokeStyle='cyan';
   ctx.stroke();
   player.shield--;
 }
 
 ui.innerText=`м җмҲҳ: ${score} | вқӨпёҸ ${lives}`;
 requestAnimationFrame(loop);
}

function gameOver(){
 active=false;
 document.getElementById('final').innerText='м җмҲҳ: '+score;
 over.style.display='block';
}

window.onload=init;
window.onresize=resize;
</script>
</body>
</html>
